version: '3.8'

services:
  process-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: process-tracker-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
